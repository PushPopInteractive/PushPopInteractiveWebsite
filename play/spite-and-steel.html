<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Spite &amp; Steel — Sneak Peek | PushPop Interactive</title>
<meta name="description" content="Playable sneak peek of Spite & Steel, the grudge-fueled card battler from PushPop Interactive.">
<style>
  :root{
    --bg:#0a0a14; --panel:#1d1730; --panel2:#241d38; --border:#3a3152;
    --gold:#f4c542; --mana:#4db8ff; --spite:#c74dff; --hp:#e04658;
    --me:#8a6fd0; --foe:#d0574c; --text:#ece5d8; --dim:#9b93ac;
    --glow:#ffd970;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    height:100dvh;
  }
  #topbar{
    width:100%;max-width:460px;height:42px;flex:0 0 42px;
    display:flex;align-items:center;gap:8px;padding:0 10px;
    user-select:none;-webkit-user-select:none;
  }
  #topbar a.back{color:var(--dim);text-decoration:none;font-size:13px;white-space:nowrap}
  #topbar a.back:hover{color:var(--text)}
  #topbar img{width:22px;height:22px;border-radius:5px}
  #topbar .title{
    font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:16px;
    letter-spacing:.06em; background:linear-gradient(180deg,#fff 20%,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;
  }
  #topbar .chip{
    font-size:9px;font-weight:800;letter-spacing:.12em;color:#120e1a;
    background:linear-gradient(135deg,var(--gold),#ff9d4d);border-radius:99px;
    padding:3px 8px;white-space:nowrap;
  }
  #stage{
    position:relative;width:min(100vw,430px);
    height:min(calc(100dvh - 46px),760px);
    touch-action:none;user-select:none;-webkit-user-select:none;
    overflow:hidden;
  }
  #shake{
    position:absolute;inset:0;display:flex;flex-direction:column;
    padding:2px 8px 6px;gap:3px;will-change:transform;
  }
  /* ---------- commander panels ---------- */
  .cmdr{
    flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:5px 8px;
    background:linear-gradient(180deg,var(--panel),#171126);
    border:1px solid var(--border);border-radius:12px;position:relative;
    transition:box-shadow .2s,border-color .2s;
  }
  .cmdr .portrait{
    width:42px;height:42px;border-radius:50%;flex:0 0 42px;
    display:flex;align-items:center;justify-content:center;font-size:22px;
    background:radial-gradient(circle at 35% 30%,#3b3160,#120e1a 75%);
    border:2px solid var(--me);box-shadow:0 0 10px rgba(138,111,208,.35);
  }
  .cmdr.foe .portrait{border-color:var(--foe);box-shadow:0 0 10px rgba(208,87,76,.35)}
  .cmdr .info{flex:1;min-width:0}
  .cmdr .name{font-family:Georgia,serif;font-size:13px;font-weight:700;letter-spacing:.03em;white-space:nowrap;overflow:hidden}
  .cmdr .bars{display:flex;align-items:center;gap:6px;margin-top:3px}
  .hpbar{flex:1;height:9px;background:#0d0a16;border-radius:99px;overflow:hidden;border:1px solid #000}
  .hpbar i{display:block;height:100%;background:linear-gradient(90deg,#a12f3f,var(--hp));border-radius:99px;transition:width .35s cubic-bezier(.22,1.4,.36,1)}
  .hpnum{font-size:12px;font-weight:800;min-width:38px;text-align:right;color:var(--hp)}
  .res{display:flex;gap:5px;margin-top:3px;font-size:11px;font-weight:700;flex-wrap:wrap}
  .res span{display:inline-flex;align-items:center;gap:3px;background:#120e1e;border:1px solid #2b2344;border-radius:99px;padding:1px 7px 1px 5px}
  .res .g{color:var(--gold)} .res .m{color:var(--mana)} .res .s{color:var(--spite)}
  .cmdr.targetable{border-color:#ff5544;box-shadow:0 0 0 2px #ff5544,0 0 18px rgba(255,85,68,.55);cursor:pointer;animation:pulse 1s infinite}
  #endturn{
    flex:0 0 auto;margin-left:4px;
    font:800 11px/1.25 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.06em;
    color:#241a02;background:linear-gradient(180deg,#ffe08a,var(--gold) 55%,#d99b1f);
    border:1px solid #8a6210;border-radius:12px;padding:10px 10px;cursor:pointer;
    box-shadow:0 3px 0 #7a5a10,0 4px 10px rgba(0,0,0,.5);
    transition:transform .12s,box-shadow .12s,filter .2s;
  }
  #endturn:active{transform:translateY(2px);box-shadow:0 1px 0 #7a5a10}
  #endturn:disabled{filter:grayscale(.85) brightness(.6);cursor:default}
  /* ---------- lanes ---------- */
  .laneblock{flex:1 1 0;display:flex;flex-direction:column;min-height:56px}
  .lane{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    background:rgba(29,23,48,.45);border:1px dashed #2e2748;border-radius:10px;
    padding:3px 4px;position:relative;transition:border-color .2s,box-shadow .2s,background .2s;
  }
  .lane .lanetag{
    position:absolute;left:6px;top:50%;transform:translateY(-50%) rotate(0deg);
    font-size:8px;font-weight:800;letter-spacing:.14em;color:#544a70;pointer-events:none;
    writing-mode:vertical-rl;text-orientation:upright;
  }
  .lane.glow{border-color:var(--glow);background:rgba(244,197,66,.07);box-shadow:inset 0 0 14px rgba(244,197,66,.12),0 0 8px rgba(244,197,66,.25);cursor:pointer;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  /* ---------- units ---------- */
  .unit{
    width:96px;max-width:31%;height:min(86px,96%);border-radius:9px;position:relative;
    background:linear-gradient(180deg,var(--panel2),#161022);
    border:2px solid #443a63;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:2px 2px 10px;cursor:default;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1),border-color .2s,box-shadow .2s,filter .2s;
    animation:drop .34s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes drop{0%{transform:scale(.4) translateY(-14px);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .unit.foeu{border-color:#5c3a44}
  .unit .emoji{font-size:21px;line-height:1.15;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}
  .unit .uname{font-size:8px;font-weight:700;color:var(--dim);white-space:nowrap;overflow:hidden;max-width:100%;letter-spacing:.02em}
  .unit .stat{
    position:absolute;bottom:-7px;font-size:10px;font-weight:900;color:#fff;
    width:22px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    border:1px solid #000;text-shadow:0 1px 1px #000;
  }
  .unit .atk{left:-5px;background:linear-gradient(180deg,#ffb066,#c25e12)}
  .unit .atk.buffed{background:linear-gradient(180deg,#9dff8a,#2e9a2e)}
  .unit .hp{right:-5px;background:linear-gradient(180deg,#ff7788,#a11f30)}
  .unit .badge{
    position:absolute;top:-7px;right:-5px;font-size:7px;font-weight:900;letter-spacing:.05em;
    background:#0d0a16;color:var(--dim);border:1px solid var(--border);border-radius:6px;padding:1px 4px;
  }
  .unit .badge.zz{color:#9fd8ff}
  .unit.ready-act{border-color:var(--glow);box-shadow:0 0 10px rgba(244,197,66,.4);cursor:pointer}
  .unit.selected{border-color:#fff;transform:scale(1.12) translateY(-3px);box-shadow:0 0 16px rgba(255,255,255,.4);z-index:3}
  .unit.targetable{border-color:#ff5544;box-shadow:0 0 0 2px #ff5544,0 0 14px rgba(255,85,68,.6);cursor:pointer;animation:pulse .9s infinite}
  .unit.spent{filter:brightness(.55) saturate(.6)}
  /* ---------- mid message ---------- */
  #midline{
    flex:0 0 22px;display:flex;align-items:center;justify-content:center;gap:8px;
    font-size:11px;color:var(--dim);position:relative;
  }
  #midline::before,#midline::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
  #midline::after{background:linear-gradient(90deg,var(--border),transparent)}
  #msg{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:82%;font-weight:600;color:var(--text)}
  #msg.foe-turn{color:#ff9d94}
  /* ---------- hand ---------- */
  #handwrap{flex:0 0 112px;display:flex;flex-direction:column;gap:2px}
  #turnrow{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);padding:0 4px;font-weight:700;letter-spacing:.08em}
  #hand{flex:1;display:flex;gap:5px;justify-content:center;align-items:stretch}
  .card{
    flex:1 1 0;max-width:78px;border-radius:9px;position:relative;overflow:hidden;
    background:linear-gradient(180deg,#2a2142,#171021);border:2px solid #443a63;
    display:flex;flex-direction:column;align-items:center;padding:14px 2px 3px;gap:1px;
    cursor:default;transition:transform .18s cubic-bezier(.34,1.56,.64,1),border-color .15s,box-shadow .2s,filter .2s;
    animation:drop .3s cubic-bezier(.34,1.56,.64,1);
  }
  .card .cost{
    position:absolute;top:2px;left:2px;display:flex;gap:2px;
  }
  .card .cost b{
    font-size:9px;font-weight:900;color:#120e1a;width:15px;height:15px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.5);
  }
  .card .cost b.g{background:var(--gold)} .card .cost b.m{background:var(--mana)} .card .cost b.s{background:var(--spite);color:#fff}
  .card .emoji{font-size:20px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}
  .card .cname{font-size:8px;font-weight:700;text-align:center;line-height:1.15;color:var(--text)}
  .card .ctext{font-size:7px;color:var(--dim);text-align:center;line-height:1.2;padding:0 2px;overflow:hidden}
  .card .cstat{font-size:9px;font-weight:900;margin-top:auto}
  .card .cstat .a{color:#ffb066} .card .cstat .h{color:#ff7788}
  .card.playable{border-color:var(--glow);box-shadow:0 0 9px rgba(244,197,66,.35);cursor:pointer}
  .card.playable:hover{transform:translateY(-4px)}
  .card.selected{border-color:#fff;transform:translateY(-8px) scale(1.06);box-shadow:0 0 16px rgba(255,255,255,.45);z-index:3}
  .card.locked{filter:brightness(.6) saturate(.7)}
  .card.locked::after{
    content:attr(data-lock);position:absolute;inset:auto 0 2px 0;font-size:7px;font-weight:800;
    color:var(--spite);text-align:center;text-shadow:0 1px 2px #000;
  }
  /* ---------- fx canvas & overlays ---------- */
  #fx{position:absolute;inset:0;pointer-events:none;z-index:10}
  #hint{
    position:absolute;left:50%;top:47%;transform:translateX(-50%);z-index:11;
    background:rgba(13,10,22,.92);border:1px solid var(--border);border-radius:99px;
    font-size:11px;color:var(--text);padding:7px 14px;white-space:nowrap;pointer-events:none;
    transition:opacity .6s;box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  #hint.gone{opacity:0}
  #endovl{
    position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    background:rgba(6,4,12,.78);backdrop-filter:blur(3px);
  }
  #endovl.show{display:flex;animation:fadein .4s}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  #endpanel{
    width:82%;max-width:320px;text-align:center;padding:26px 20px 22px;
    background:linear-gradient(180deg,#251c3e,#140f22);border:1px solid var(--border);
    border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);
    animation:panelin .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes panelin{from{transform:scale(.7) translateY(20px);opacity:0}to{transform:scale(1);opacity:1}}
  #endtitle{font-family:Georgia,serif;font-size:26px;font-weight:800;letter-spacing:.04em;margin-bottom:6px}
  #endtitle.win{background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  #endtitle.lose{color:var(--foe)}
  #endsub{font-size:12px;color:var(--dim);margin-bottom:16px;line-height:1.5}
  #again{
    display:block;width:100%;padding:12px;border-radius:12px;border:1px solid #8a6210;
    font:800 14px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.05em;color:#241a02;
    background:linear-gradient(180deg,#ffe08a,var(--gold) 55%,#d99b1f);cursor:pointer;
    box-shadow:0 3px 0 #7a5a10;margin-bottom:14px;transition:transform .12s;
  }
  #again:active{transform:translateY(2px)}
  #coming{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:8px}
  #endovl a{color:var(--mana);font-size:12px;text-decoration:none}
  #endovl a:hover{text-decoration:underline}
  @media (max-height:640px){
    .cmdr{flex-basis:50px} .cmdr .portrait{width:36px;height:36px;flex-basis:36px;font-size:18px}
    #handwrap{flex-basis:98px} .unit .emoji{font-size:17px}
  }
</style>
</head>
<body>
<div id="topbar">
  <a class="back" href="/games/spite-and-steel.html">&larr; Back</a>
  <img src="/assets/games/spite-and-steel/icon.png" alt="" onerror="this.style.display='none'">
  <span class="title">SPITE &amp; STEEL</span>
  <span class="chip">SNEAK PEEK</span>
</div>

<div id="stage">
  <div id="shake">
    <div class="cmdr foe" id="foePanel" data-act="cmdr" data-side="foe">
      <div class="portrait">🌀</div>
      <div class="info">
        <div class="name">Voidmage Zaern</div>
        <div class="bars"><div class="hpbar"><i id="foeHpBar"></i></div><span class="hpnum" id="foeHpNum"></span></div>
        <div class="res"><span class="s">☠ <b id="foeSpite">0</b> Spite</span><span style="color:var(--dim)" id="foeIntent"></span></div>
      </div>
    </div>

    <div class="laneblock">
      <div class="lane" id="lane-foe-rear"><span class="lanetag">REAR</span></div>
    </div>
    <div class="laneblock">
      <div class="lane" id="lane-foe-front"><span class="lanetag">FRONT</span></div>
    </div>

    <div id="midline"><span id="msg"></span></div>

    <div class="laneblock">
      <div class="lane" id="lane-me-front" data-act="lane" data-lane="front"><span class="lanetag">FRONT</span></div>
    </div>
    <div class="laneblock">
      <div class="lane" id="lane-me-rear" data-act="lane" data-lane="rear"><span class="lanetag">REAR</span></div>
    </div>

    <div class="cmdr" id="mePanel" data-act="cmdr" data-side="me">
      <div class="portrait">🦅</div>
      <div class="info">
        <div class="name">Skyseer Aelis <span style="color:var(--dim);font-size:10px">(you)</span></div>
        <div class="bars"><div class="hpbar"><i id="meHpBar"></i></div><span class="hpnum" id="meHpNum"></span></div>
        <div class="res">
          <span class="g">◉ <b id="meGold">0</b></span>
          <span class="m">✦ <b id="meMana">0</b></span>
          <span class="s">☠ <b id="meSpite">0</b></span>
        </div>
      </div>
      <button id="endturn" data-act="end">END<br>TURN</button>
    </div>

    <div id="handwrap">
      <div id="turnrow"><span id="turnLbl">TURN 1</span><span>DEFEAT THE VOIDMAGE</span></div>
      <div id="hand"></div>
    </div>
  </div>

  <canvas id="fx"></canvas>
  <div id="hint">Tap a glowing card, then a lane &bull; Front Allies attack</div>

  <div id="endovl">
    <div id="endpanel">
      <div id="endtitle"></div>
      <div id="endsub"></div>
      <button id="again" onclick="location.reload()">PLAY AGAIN</button>
      <div id="coming">Coming soon to the App Store</div>
      <a href="/games/spite-and-steel.html">About Spite &amp; Steel &rarr;</a>
    </div>
  </div>
</div>

<script>
'use strict';
/* ================= Spite & Steel — web sneak peek =================
   A ruthlessly simplified slice of the real Godot game:
   Gold stockpiles, Mana refreshes, Spite is a threshold that grows
   only when an enemy source bleeds your commander. Front attacks,
   Rear is safe while a Front Ally stands. First commander to 0 loses.
=================================================================== */

// ---------- card data (names, mood, numbers from the real game, demo-tuned) ----------
const CARDS = {
  footsoldier:{name:'Human Footsoldier', emoji:'⚔️', type:'ally', race:'human', gold:2, atk:2, hp:2,
    txt:'Formation: +1 ATK beside another Human in Front.'},
  shieldbearer:{name:'Human Shieldbearer', emoji:'🛡️', type:'ally', race:'human', gold:3, atk:1, hp:5,
    txt:'The wall complains, but it holds.'},
  captain:{name:'Human Captain', emoji:'🎖️', type:'ally', race:'human', gold:5, atk:3, hp:4, aura:1,
    txt:'Your other Front Allies have +1 ATK.'},
  priest:{name:'Old Village Priest', emoji:'⛪', type:'ally', race:'human', gold:3, atk:1, hp:3, ability:'heal',
    txt:'Rear — tap: heal your commander 2. Healing denies Spite!'},
  pyromancer:{name:'Human Pyromancer', emoji:'🔥', type:'ally', race:'human', gold:4, atk:2, hp:3, ability:'zap',
    txt:'Rear — tap, 1 Mana: deal 2 to an enemy Ally.'},
  berserker:{name:'Dwarven Berserker', emoji:'🪓', type:'ally', race:'dwarven', gold:4, atk:4, hp:3, spiteReq:2,
    txt:'Needs 2 Spite. Spite is not spent.'},
  fireball:{name:'Fireball', emoji:'☄️', type:'action', mana:2,
    txt:'Deal 3 to an enemy Ally or commander.'},
  healing:{name:'Healing Light', emoji:'🌟', type:'action', mana:1,
    txt:'Heal your commander 5.'},
  battlecry:{name:'Battle Cry', emoji:'📯', type:'action', gold:3,
    txt:'Front Allies get +2 ATK this turn.'},
  // Zaern's forces
  prowler:{name:'Beastkin Prowler', emoji:'🐾', type:'ally', race:'beastkin', gold:2, atk:2, hp:2},
  stalker:{name:'Beastkin Stalker', emoji:'🐺', type:'ally', race:'beastkin', gold:3, atk:3, hp:2},
  hexsinger:{name:'Fae Hexsinger', emoji:'🎶', type:'ally', race:'fae', gold:3, atk:1, hp:3},
  nightblade:{name:'Fae Nightblade', emoji:'🗡️', type:'ally', race:'fae', gold:4, atk:3, hp:3},
  frostcaller:{name:'Fae Frostcaller', emoji:'❄️', type:'ally', race:'fae', gold:4, atk:2, hp:4},
};

// ---------- state ----------
let uidSeq = 1;
function mkUnit(id, owner){
  const d = CARDS[id];
  return {uid:uidSeq++, id, owner, name:d.name, emoji:d.emoji, race:d.race||'',
    atk:d.atk, hp:d.hp, maxhp:d.hp, aura:d.aura||0, ability:d.ability||null,
    ready:false, activated:false, tempAtk:0};
}
const S = {
  turn:1, aiTurn:0, phase:'boot', busy:0, sel:null,
  me:{hp:20, maxhp:20, gold:2, mana:0, manaMax:0, spite:0, front:[], rear:[],
      hand:['footsoldier','shieldbearer','priest','fireball'],
      deck:['captain','berserker','pyromancer','battlecry','healing','footsoldier','fireball','shieldbearer','berserker','healing','battlecry','fireball'],
      startHp:20, bled:false},
  foe:{hp:18, maxhp:18, gold:0, spite:0, front:[], rear:[], startHp:18, bled:false,
      script:['prowler','stalker','hexsinger','nightblade','frostcaller','nightblade','stalker','frostcaller']},
};
const side = w => (w==='me' ? S.me : S.foe);
const other = w => (w==='me' ? 'foe' : 'me');

function effAtk(u){
  const P = side(u.owner);
  let a = u.atk + u.tempAtk;
  if (P.front.includes(u)){
    a += P.front.filter(o=>o!==u).reduce((s,o)=>s+o.aura, 0);
    if (u.id==='footsoldier' && P.front.some(o=>o!==u && o.race==='human')) a += 1;
  }
  return a;
}

// ---------- DOM refs ----------
const $ = id => document.getElementById(id);
const stage = $('stage'), shakeEl = $('shake'), fx = $('fx'), ctx = fx.getContext('2d');
const lanes = {
  'me-front':$('lane-me-front'), 'me-rear':$('lane-me-rear'),
  'foe-front':$('lane-foe-front'), 'foe-rear':$('lane-foe-rear'),
};

// ---------- fx engine (rAF only) ----------
let parts=[], floaters=[], projectiles=[], tasks=[], tweens=[], shakeMag=0, clock=0;
function after(ms, fn){ tasks.push({t:clock+ms, fn}); }
function addShake(m){ shakeMag = Math.min(14, shakeMag+m); }
function centerOf(el){
  const r = el.getBoundingClientRect(), s = stage.getBoundingClientRect();
  return {x:r.left-s.left+r.width/2, y:r.top-s.top+r.height/2};
}
function burst(x,y,color,n=14,spd=3){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, v=(0.6+Math.random())*spd;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1.2,life:1,decay:.02+Math.random()*.02,
      size:2+Math.random()*3,color,grav:.09});
  }
}
function floater(x,y,text,color,big=false){
  floaters.push({x,y,text,color,life:1,big});
}
function projectile(from,to,color,emoji,onHit){
  projectiles.push({x0:from.x,y0:from.y,x1:to.x,y1:to.y,t:0,color,emoji,onHit,speed:1/420});
}
function lungeUnit(uid, targetEl, onHit, onDone){
  const el = stage.querySelector(`[data-uid="${uid}"]`);
  if(!el || !targetEl){ onHit&&onHit(); onDone&&onDone(); return; }
  const a = centerOf(el), b = centerOf(targetEl);
  const dx=(b.x-a.x)*0.72, dy=(b.y-a.y)*0.72;
  el.style.zIndex = 5;
  tweens.push({el, dx, dy, t:0, dur:460, hit:false, onHit, onDone});
}
function loop(ts){
  if(!loop.last) loop.last = ts;
  const dt = Math.min(50, ts-loop.last); loop.last = ts; clock += dt;
  // tasks
  for(let i=tasks.length-1;i>=0;i--){ if(clock>=tasks[i].t){ const f=tasks[i].fn; tasks.splice(i,1); f(); } }
  // tweens (attack lunges)
  for(let i=tweens.length-1;i>=0;i--){
    const w = tweens[i]; w.t += dt;
    const p = Math.min(1, w.t/w.dur);
    const arc = Math.sin(p*Math.PI);           // out and back
    const sq = 1 + arc*0.12;                    // squash/stretch
    w.el.style.transition = 'none';
    w.el.style.transform = `translate(${w.dx*arc}px,${w.dy*arc}px) scale(${sq},${2-sq})`;
    if(!w.hit && p>=0.5){ w.hit=true; w.onHit&&w.onHit(); }
    if(p>=1){
      w.el.style.transform=''; w.el.style.transition=''; w.el.style.zIndex='';
      tweens.splice(i,1); w.onDone&&w.onDone();
    }
  }
  // shake
  if(shakeMag>0.15){
    shakeMag *= Math.pow(0.88, dt/16);
    shakeEl.style.transform = `translate(${(Math.random()*2-1)*shakeMag}px,${(Math.random()*2-1)*shakeMag}px)`;
  } else if(shakeMag!==0){ shakeMag=0; shakeEl.style.transform=''; }
  // draw
  const W = fx.clientWidth, H = fx.clientHeight;
  ctx.clearRect(0,0,W,H);
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i]; p.t += dt*p.speed;
    const e = Math.min(1,p.t), ee = e*e*(3-2*e);
    const x = p.x0+(p.x1-p.x0)*ee, y = p.y0+(p.y1-p.y0)*ee - Math.sin(e*Math.PI)*26;
    parts.push({x,y,vx:(Math.random()-.5),vy:(Math.random()-.5),life:.7,decay:.06,size:2.5,color:p.color,grav:0});
    ctx.font = '20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.emoji, x, y);
    if(e>=1){ projectiles.splice(i,1); p.onHit&&p.onHit(); }
  }
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i]; p.x+=p.vx*dt/16; p.y+=p.vy*dt/16; p.vy+=p.grav*dt/16; p.life-=p.decay*dt/16;
    if(p.life<=0){ parts.splice(i,1); continue; }
    ctx.globalAlpha = Math.max(0,p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for(let i=floaters.length-1;i>=0;i--){
    const f = floaters[i]; f.life -= 0.011*dt/16; f.y -= 0.55*dt/16;
    if(f.life<=0){ floaters.splice(i,1); continue; }
    ctx.globalAlpha = Math.min(1, f.life*1.6);
    ctx.font = `900 ${f.big?26:18}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,.85)'; ctx.lineWidth=4; ctx.strokeText(f.text,f.x,f.y);
    ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(loop);
}
function sizeFx(){
  const r = stage.getBoundingClientRect(), d = window.devicePixelRatio||1;
  fx.width = r.width*d; fx.height = r.height*d;
  fx.style.width = r.width+'px'; fx.style.height = r.height+'px';
  ctx.setTransform(d,0,0,d,0,0);
}
window.addEventListener('resize', sizeFx);

// ---------- messaging ----------
function setMsg(t, foeTone=false){
  const m = $('msg'); m.textContent = t;
  m.className = foeTone ? 'foe-turn' : '';
}

// ---------- rendering ----------
function unitEl(u){
  const el = document.createElement('div');
  const mine = u.owner==='me';
  el.className = 'unit'+(mine?'':' foeu');
  el.dataset.uid = u.uid; el.dataset.act = 'unit';
  const ea = effAtk(u);
  const canAct = mine && S.phase==='player' && !S.busy && u.ready && !u.activated &&
    (S.me.front.includes(u) || (u.ability && !(u.ability==='zap' && S.me.mana<1)));
  if (S.sel && S.sel.type!=='none'){
    if (S.sel.uid===u.uid) el.classList.add('selected');
    else if (isTarget(u)) el.classList.add('targetable');
    else if (mine && canAct) el.classList.add('ready-act');
  } else if (canAct) el.classList.add('ready-act');
  if (u.activated || (!u.ready)) el.classList.add('spent');
  el.innerHTML =
    `<div class="emoji">${u.emoji}</div><div class="uname">${u.name.split(' ').pop()}</div>`+
    `<div class="stat atk${ea>u.atk?' buffed':''}">${ea}</div>`+
    `<div class="stat hp">${u.hp}</div>`+
    (!u.ready ? '<div class="badge zz">NEW</div>' :
      (u.activated ? '<div class="badge">DONE</div>' : ''));
  return el;
}
function renderLane(key, arr){
  const el = lanes[key];
  el.querySelectorAll('.unit').forEach(n=>n.remove());
  arr.forEach(u=>el.appendChild(unitEl(u)));
  const glow = S.sel && S.sel.type==='card' && CARDS[S.me.hand[S.sel.idx]].type==='ally'
    && key.startsWith('me') && arr.length<3;
  el.classList.toggle('glow', !!glow && S.phase==='player');
}
function canPlay(id){
  const d = CARDS[id];
  if ((d.gold||0) > S.me.gold) return false;
  if ((d.mana||0) > S.me.mana) return false;
  if ((d.spiteReq||0) > S.me.spite) return false;
  if (d.type==='ally' && S.me.front.length>=3 && S.me.rear.length>=3) return false;
  return true;
}
function render(){
  renderLane('me-front', S.me.front); renderLane('me-rear', S.me.rear);
  renderLane('foe-front', S.foe.front); renderLane('foe-rear', S.foe.rear);
  // hand
  const h = $('hand'); h.innerHTML='';
  S.me.hand.forEach((id,i)=>{
    const d = CARDS[id];
    const el = document.createElement('div');
    el.className='card'; el.dataset.act='hand'; el.dataset.idx=i;
    const ok = S.phase==='player' && !S.busy && canPlay(id);
    if (ok) el.classList.add('playable');
    if (S.sel && S.sel.type==='card' && S.sel.idx===i) el.classList.add('selected');
    if (!ok && (d.spiteReq||0) > S.me.spite){
      el.classList.add('locked'); el.dataset.lock = `NEEDS ${d.spiteReq} SPITE`;
    } else if (!ok && S.phase==='player'){ el.classList.add('locked'); el.dataset.lock=''; }
    let cost = '';
    if (d.gold) cost += `<b class="g">${d.gold}</b>`;
    if (d.mana) cost += `<b class="m">${d.mana}</b>`;
    if (d.spiteReq) cost += `<b class="s">${d.spiteReq}</b>`;
    el.innerHTML = `<div class="cost">${cost}</div><div class="emoji">${d.emoji}</div>`+
      `<div class="cname">${d.name}</div><div class="ctext">${d.txt||''}</div>`+
      (d.type==='ally' ? `<div class="cstat"><span class="a">${d.atk}⚔</span> <span class="h">${d.hp}♥</span></div>` : '');
    h.appendChild(el);
  });
  // panels
  $('meHpNum').textContent = S.me.hp+'/'+S.me.maxhp;
  $('meHpBar').style.width = Math.max(0,S.me.hp/S.me.maxhp*100)+'%';
  $('foeHpNum').textContent = S.foe.hp+'/'+S.foe.maxhp;
  $('foeHpBar').style.width = Math.max(0,S.foe.hp/S.foe.maxhp*100)+'%';
  $('meGold').textContent = S.me.gold;
  $('meMana').textContent = S.me.mana+'/'+S.me.manaMax;
  $('meSpite').textContent = S.me.spite;
  $('foeSpite').textContent = S.foe.spite;
  $('turnLbl').textContent = 'TURN '+S.turn;
  $('endturn').disabled = S.phase!=='player' || !!S.busy;
  $('foePanel').classList.toggle('targetable', !!(S.sel && isCmdrTarget('foe')));
  $('foeIntent').textContent = (S.aiTurn%2===0) ? '⚡ Void Bolt readies…' : '';
}
// which things are valid targets for current selection
function attackTargetsOf(attackerOwner){
  const F = side(other(attackerOwner));
  if (F.front.length) return {units:F.front.slice(), cmdr:false};
  return {units:F.rear.slice(), cmdr:true};
}
function isTarget(u){
  if (!S.sel) return false;
  if (S.sel.type==='attack') return attackTargetsOf('me').units.includes(u);
  if (S.sel.type==='spell')  return u.owner==='foe';           // Fireball: any enemy
  if (S.sel.type==='zap')    return u.owner==='foe';           // Pyromancer: enemy ally
  return false;
}
function isCmdrTarget(sideName){
  if (!S.sel || sideName!=='foe') return false;
  if (S.sel.type==='spell') return true;                        // Fireball can hit commander
  if (S.sel.type==='attack') return attackTargetsOf('me').cmdr;
  return false;
}

// ---------- damage / healing ----------
function checkEnd(){
  if (S.phase==='over') return true;
  if (S.foe.hp<=0 || S.me.hp<=0){
    S.phase='over';
    const win = S.foe.hp<=0;
    addShake(win?8:12);
    after(650, ()=>{
      $('endtitle').textContent = win ? 'VICTORY' : 'DEFEAT';
      $('endtitle').className = win ? 'win' : 'lose';
      $('endsub').innerHTML = win
        ? 'Voidmage Zaern falls — the grudge is settled.<br>The full campaign awaits.'
        : 'Skyseer Aelis falls… but Spite remembers.<br>Sharpen your grudge and try again.';
      $('endovl').classList.add('show');
    });
    render();
    return true;
  }
  return false;
}
function hitCmdr(sideName, dmg, srcIsEnemy){
  const P = side(sideName);
  P.hp = Math.max(0, P.hp - dmg);
  if (srcIsEnemy) P.bled = true;
  const el = sideName==='me' ? $('mePanel') : $('foePanel');
  const c = centerOf(el);
  floater(c.x, c.y-8, '-'+dmg, '#ff5566', true);
  burst(c.x, c.y, sideName==='me' ? '#e04658' : '#f4c542', 16, 3.4);
  addShake(3+dmg);
}
function healCmdr(sideName, amt){
  const P = side(sideName);
  const real = Math.min(amt, P.maxhp - P.hp);
  P.hp += real;
  const el = sideName==='me' ? $('mePanel') : $('foePanel');
  const c = centerOf(el);
  floater(c.x, c.y-8, '+'+real, '#7dffa0', true);
  burst(c.x, c.y, '#7dffa0', 10, 2);
}
function hitUnit(u, dmg){
  u.hp -= dmg;
  const el = stage.querySelector(`[data-uid="${u.uid}"]`);
  const c = el ? centerOf(el) : {x:0,y:0};
  floater(c.x, c.y-10, '-'+dmg, '#ff8866');
  burst(c.x, c.y, '#ff8866', 10, 2.6);
  if (u.hp<=0){
    burst(c.x, c.y, '#c74dff', 18, 3.6);
    floater(c.x, c.y-26, '💀', '#fff');
    const P = side(u.owner);
    P.front = P.front.filter(x=>x!==u);
    P.rear  = P.rear.filter(x=>x!==u);
    addShake(2);
  }
}
/* Spite Check — faithful to the real rule: a commander gains exactly 1 Spite
   at the end of their own turn iff they sit below the mark recorded before the
   enemy's last turn AND an enemy source drew blood. Healing back denies it. */
function checkSpite(w){
  const P = side(w);
  if (P.bled && P.hp < P.startHp){
    P.spite += 1;
    const el = w==='me' ? $('mePanel') : $('foePanel');
    const c = centerOf(el);
    floater(c.x, c.y-24, '+1 SPITE', '#c74dff', true);
    burst(c.x, c.y, '#c74dff', 20, 3);
    if (w==='me' && S.me.spite===2 && S.me.hand.includes('berserker'))
      after(700, ()=>setMsg('Your grudge deepens — Dwarven Berserker unlocked!'));
  }
  P.startHp = P.hp; P.bled = false;
}

// ---------- player turn ----------
function startPlayerTurn(){
  if (S.phase==='over') return;
  S.phase='player'; S.sel=null;
  S.foe.startHp = S.foe.hp; S.foe.bled = false;   // mark Zaern before your turn
  S.me.gold += 4;
  S.me.manaMax = Math.min(S.turn,3);
  S.me.mana = S.me.manaMax;
  [...S.me.front, ...S.me.rear].forEach(u=>{ u.ready=true; u.activated=false; });
  if (S.turn>1){
    if (S.me.deck.length && S.me.hand.length<6) S.me.hand.push(S.me.deck.shift());
  }
  setMsg('Your turn — recruit with ◉ Gold, spend ✦ Mana, then strike.');
  render();
}
function endPlayerTurn(){
  if (S.phase!=='player' || S.busy) return;
  S.sel=null;
  [...S.me.front, ...S.me.rear].forEach(u=>u.tempAtk=0);
  checkSpite('me');   // did you end your turn still bleeding? The grudge grows.
  render();
  if (checkEnd()) return;
  aiTurn();
}
// play a card from hand
function playCard(idx, lane){
  const id = S.me.hand[idx], d = CARDS[id];
  S.me.gold -= d.gold||0; S.me.mana -= d.mana||0;
  S.me.hand.splice(idx,1);
  if (d.type==='ally'){
    const u = mkUnit(id,'me');
    S.me[lane].push(u);
    render();
    const el = stage.querySelector(`[data-uid="${u.uid}"]`);
    if (el){ const c=centerOf(el); burst(c.x,c.y,'#f4c542',14,2.8); }
    setMsg(`${d.name} recruited to the ${lane==='front'?'Front':'Rear'}.`);
  }
  S.sel=null;
}
function castNoTarget(idx){
  const id = S.me.hand[idx], d = CARDS[id];
  S.me.gold -= d.gold||0; S.me.mana -= d.mana||0;
  S.me.hand.splice(idx,1); S.sel=null;
  if (id==='healing'){ healCmdr('me',5); setMsg('Healing Light — your commander mends 5.'); }
  if (id==='battlecry'){
    S.me.front.forEach(u=>u.tempAtk+=2);
    S.me.front.forEach(u=>{
      const el = stage.querySelector(`[data-uid="${u.uid}"]`);
      if (el){ const c=centerOf(el); burst(c.x,c.y,'#ffb066',10,2.4); }
    });
    setMsg('Battle Cry! Front Allies +2 ATK this turn.');
  }
  render();
}
function castFireball(idx, targetUnit, atCmdr){
  const d = CARDS['fireball'];
  S.me.mana -= d.mana; S.me.hand.splice(idx,1); S.sel=null; S.busy++;
  const from = centerOf($('mePanel'));
  const toEl = atCmdr ? $('foePanel') : stage.querySelector(`[data-uid="${targetUnit.uid}"]`);
  const to = centerOf(toEl);
  render();
  projectile(from,to,'#ff9d4d','☄️',()=>{
    if (atCmdr){ hitCmdr('foe',3,true); setMsg('Fireball sears Zaern for 3!'); }
    else { hitUnit(targetUnit,3); setMsg(`Fireball hits ${targetUnit.name} for 3.`); }
    S.busy--; render(); checkEnd();
  });
}
function useAbility(u, target){
  if (u.ability==='heal'){
    u.activated=true; healCmdr('me',2);
    setMsg('The Priest mends 2. (Healing to full mark denies Spite…)');
    render();
  } else if (u.ability==='zap'){
    u.activated=true; S.me.mana -= 1; S.sel=null; S.busy++;
    const el = stage.querySelector(`[data-uid="${u.uid}"]`);
    const from = el?centerOf(el):centerOf($('mePanel'));
    const toEl = stage.querySelector(`[data-uid="${target.uid}"]`);
    const to = toEl?centerOf(toEl):from;
    render();
    projectile(from,to,'#ff6633','🔥',()=>{
      hitUnit(target,2); setMsg(`Pyromancer burns ${target.name} for 2.`);
      S.busy--; render(); checkEnd();
    });
  }
}
function doAttack(attacker, targetUnit, atCmdr, done){
  attacker.activated = true; S.busy++;
  const dmg = effAtk(attacker);
  const toEl = atCmdr
    ? (attacker.owner==='me' ? $('foePanel') : $('mePanel'))
    : stage.querySelector(`[data-uid="${targetUnit.uid}"]`);
  render();
  lungeUnit(attacker.uid, toEl, ()=>{
    if (atCmdr){
      hitCmdr(other(attacker.owner), dmg, true);
      setMsg(`${attacker.name} strikes the commander for ${dmg}!`, attacker.owner==='foe');
    } else {
      hitUnit(targetUnit, dmg);
      setMsg(`${attacker.name} hits ${targetUnit.name} for ${dmg}.`, attacker.owner==='foe');
    }
  }, ()=>{
    S.busy--; render();
    if (!checkEnd() && done) done();
  });
}

// ---------- AI: Voidmage Zaern ----------
function aiTurn(){
  S.phase='ai'; S.busy++;
  S.aiTurn++;
  S.foe.gold += 4;
  S.me.startHp = S.me.hp; S.me.bled = false;   // mark YOUR health before Zaern moves
  [...S.foe.front, ...S.foe.rear].forEach(u=>{ u.ready=true; u.activated=false; });
  setMsg("Voidmage Zaern's turn…", true);
  render();

  function recruitStep(){
    const maxRecruits = S.aiTurn>=4 ? 2 : 1;
    let recruited = 0;
    while (recruited<maxRecruits && S.foe.script.length){
      const id = S.foe.script[0], d = CARDS[id];
      if (d.gold > S.foe.gold) break;
      const laneName = (id==='hexsinger') && S.foe.rear.length<3 ? 'rear'
        : (S.foe.front.length<3 ? 'front' : (S.foe.rear.length<3 ? 'rear' : null));
      if (!laneName) break;
      S.foe.script.shift(); S.foe.gold -= d.gold;
      const u = mkUnit(id,'foe');
      S.foe[laneName].push(u);
      recruited++;
      render();
      const el = stage.querySelector(`[data-uid="${u.uid}"]`);
      if (el){ const c=centerOf(el); burst(c.x,c.y,'#d0574c',12,2.6); }
      setMsg(`Zaern recruits ${d.name}.`, true);
    }
  }
  function boltStep(cb){
    setMsg('Zaern channels VOID BOLT!', true);
    projectile(centerOf($('foePanel')), centerOf($('mePanel')), '#c74dff', '🌀', ()=>{
      hitCmdr('me',2,true); render();
      if (!checkEnd()) cb();
    });
  }
  function attackStep(){
    if (S.phase==='over') return;
    const ready = S.foe.front.filter(u=>u.ready && !u.activated);
    if (!ready.length){ finishAi(); return; }
    const attacker = ready[0];
    const t = attackTargetsOf('foe');
    if (t.cmdr){
      doAttack(attacker, null, true, ()=>after(380, attackStep));
    } else {
      const dmg = effAtk(attacker);
      const kill = t.units.filter(u=>u.hp<=dmg).sort((a,b)=>effAtk(b)-effAtk(a))[0];
      const tgt = kill || t.units.slice().sort((a,b)=>a.hp-b.hp)[0];
      doAttack(attacker, tgt, false, ()=>after(380, attackStep));
    }
  }
  function finishAi(){
    if (S.phase==='over') return;
    after(500, ()=>{
      if (S.phase==='over') return;
      checkSpite('foe');
      S.busy--;
      S.turn++;
      render();
      startPlayerTurn();
    });
  }
  after(550, ()=>{
    if (S.phase==='over') return;
    recruitStep();
    after(800, ()=>{
      if (S.phase==='over') return;
      if (S.aiTurn%2===1) boltStep(()=>after(650, attackStep));
      else attackStep();
    });
  });
}

// ---------- input ----------
function cancelSel(){ S.sel=null; render(); }
function onTap(target){
  if (S.phase!=='player' || S.busy) return;
  const act = target.dataset.act;
  if (act==='end'){ endPlayerTurn(); return; }
  if (act==='hand'){
    const idx = +target.dataset.idx;
    const id = S.me.hand[idx], d = CARDS[id];
    if (!canPlay(id)){
      if ((d.spiteReq||0) > S.me.spite) setMsg(`Needs ${d.spiteReq} Spite — let your commander bleed…`);
      else if ((d.gold||0) > S.me.gold) setMsg(`Not enough Gold (needs ${d.gold} ◉).`);
      else if ((d.mana||0) > S.me.mana) setMsg(`Not enough Mana (needs ${d.mana} ✦).`);
      cancelSel(); return;
    }
    if (S.sel && S.sel.type==='card' && S.sel.idx===idx){ cancelSel(); return; }
    if (d.type==='ally'){ S.sel={type:'card', idx}; setMsg(`${d.name} — tap a lane. Front fights, Rear stays safe.`); }
    else if (id==='fireball'){ S.sel={type:'spell', idx}; setMsg('Fireball — pick an enemy Ally or Zaern.'); }
    else castNoTarget(idx);
    render(); return;
  }
  if (act==='lane'){
    if (S.sel && S.sel.type==='card'){
      const lane = target.dataset.lane;
      if (S.me[lane].length>=3){ setMsg('That lane is full.'); return; }
      playCard(S.sel.idx, lane); render();
    }
    return;
  }
  if (act==='unit'){
    const uid = +target.dataset.uid;
    const all = [...S.me.front,...S.me.rear,...S.foe.front,...S.foe.rear];
    const u = all.find(x=>x.uid===uid);
    if (!u) return;
    if (u.owner==='me'){
      if (S.sel && S.sel.uid===u.uid){ cancelSel(); return; }
      if (!u.ready){ setMsg(`${u.name} is freshly recruited — ready next turn.`); return; }
      if (u.activated){ setMsg(`${u.name} has already acted this turn.`); return; }
      if (S.me.front.includes(u)){
        S.sel={type:'attack', uid:u.uid, unit:u};
        const t = attackTargetsOf('me');
        setMsg(`${u.name} (ATK ${effAtk(u)}) — ${t.cmdr?'strike Zaern or his Rear!':'pick an enemy Front Ally.'}`);
        render();
      } else if (u.ability==='heal'){
        useAbility(u);
      } else if (u.ability==='zap'){
        if (S.me.mana<1){ setMsg('Pyromancer needs 1 ✦ Mana.'); return; }
        const foes = [...S.foe.front,...S.foe.rear];
        if (!foes.length){ setMsg('No enemy Allies to burn.'); return; }
        S.sel={type:'zap', uid:u.uid, unit:u};
        setMsg('Pyromancer — pick an enemy Ally to burn for 2.');
        render();
      } else {
        setMsg(`${u.name} watches from the Rear. Only Front Allies attack.`);
      }
      return;
    }
    // enemy unit tapped
    if (S.sel){
      if (S.sel.type==='attack' && isTarget(u)){
        const atk = S.sel.unit; S.sel=null;
        doAttack(atk, u, false, null);
      }
      else if (S.sel.type==='spell') castFireball(S.sel.idx, u, false);
      else if (S.sel.type==='zap') useAbility(S.sel.unit, u);
      else cancelSel();
    }
    return;
  }
  if (act==='cmdr'){
    if (target.dataset.side==='foe' && S.sel){
      if (S.sel.type==='spell'){ castFireball(S.sel.idx, null, true); return; }
      if (S.sel.type==='attack' && attackTargetsOf('me').cmdr){
        const u = S.sel.unit; S.sel=null; doAttack(u, null, true, null); return;
      }
    }
    cancelSel();
    return;
  }
  cancelSel();
}
let hintGone = false;
stage.addEventListener('pointerdown', e=>{
  if (!hintGone){ hintGone=true; $('hint').classList.add('gone'); }
  const t = e.target.closest('[data-act]');
  if (t) onTap(t); else cancelSel();
});
stage.addEventListener('touchstart', e=>{ e.preventDefault(); }, {passive:false});
stage.addEventListener('touchmove', e=>{ e.preventDefault(); }, {passive:false});
document.addEventListener('keydown', e=>{
  if (e.code==='Space' || e.code==='Enter'){ e.preventDefault(); endPlayerTurn(); }
  if (e.code==='Escape') cancelSel();
  if (e.code.startsWith('Digit')){
    const i = +e.code.slice(5)-1;
    const el = $('hand').children[i];
    if (el) onTap(el);
  }
});

// ---------- boot: straight into the fight ----------
sizeFx();
requestAnimationFrame(loop);
S.me.startHp = S.me.hp; S.foe.startHp = S.foe.hp;
startPlayerTurn();
</script>
