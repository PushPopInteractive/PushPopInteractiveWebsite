<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>Unearth — Sneak Peek — PushPop Interactive</title>
<meta name="description" content="Playable sneak peek of Unearth: descend into Floor -1, destroy the skeleton spawner, find the glowing stairs.">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background:#0a0a14;
    color:#e8e4f0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #topbar {
    position:fixed; top:0; left:0; right:0; height:44px; z-index:20;
    display:flex; align-items:center; gap:10px; padding:0 14px;
    background:rgba(10,10,20,.92); border-bottom:1px solid #241f38;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  #topbar .back { color:#9b8ec4; text-decoration:none; font-size:13px; white-space:nowrap; }
  #topbar .back:hover { color:#cfc4f4; }
  #topbar .title { font-weight:700; letter-spacing:.14em; font-size:15px; color:#f0ecfa; }
  #topbar .chip {
    font-size:9px; font-weight:700; letter-spacing:.12em; color:#e9d5ff;
    background:linear-gradient(135deg,#5b21b6,#7c3aed); border:1px solid #a855f7;
    padding:3px 7px; border-radius:99px;
  }
  #stage {
    position:fixed; top:44px; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center;
    padding:6px;
  }
  #playarea {
    position:relative; touch-action:none;
    box-shadow:0 0 60px rgba(124,58,237,.14), inset 0 0 80px rgba(0,0,0,.5);
    border-radius:10px; overflow:hidden;
  }
  canvas { display:block; background:#0a0a14; border-radius:10px; }
  #hint {
    position:absolute; left:0; right:0; bottom:14%; text-align:center; z-index:5;
    font-size:13px; color:#cfc8e6; text-shadow:0 2px 8px #000;
    opacity:1; transition:opacity .8s ease; pointer-events:none;
  }
  #hint.gone { opacity:0; }
  #overlay {
    position:absolute; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:rgba(6,5,14,.72); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
    opacity:0; pointer-events:none; transition:opacity .5s ease;
  }
  #overlay.show { opacity:1; pointer-events:auto; }
  #panel {
    width:min(310px, 86%); text-align:center; padding:26px 22px 22px;
    background:linear-gradient(180deg,#161226,#100c1e);
    border:1px solid #372b5c; border-radius:16px;
    box-shadow:0 12px 50px rgba(0,0,0,.7), 0 0 40px rgba(168,85,247,.15);
    transform:translateY(14px) scale(.96); transition:transform .5s cubic-bezier(.2,1.4,.4,1);
  }
  #overlay.show #panel { transform:translateY(0) scale(1); }
  #panel img { width:56px; height:56px; border-radius:13px; margin-bottom:10px; box-shadow:0 4px 18px rgba(0,0,0,.6); }
  #panel h2 { font-size:22px; letter-spacing:.08em; margin-bottom:6px; }
  #panel h2.win { color:#c9a6ff; text-shadow:0 0 18px rgba(168,85,247,.6); }
  #panel h2.lose { color:#ff8a8a; text-shadow:0 0 18px rgba(220,60,60,.4); }
  #panel .flavor { font-size:13px; color:#a99fc9; line-height:1.5; margin-bottom:14px; }
  #stats { display:flex; justify-content:center; gap:18px; margin-bottom:16px; }
  #stats .stat { font-size:16px; font-weight:700; color:#f4d97a; }
  #stats .stat.k { color:#e8e2d2; }
  #stats .stat.t { color:#9b8ec4; }
  #stats .lbl { display:block; font-size:9px; font-weight:600; letter-spacing:.14em; color:#6f668f; margin-top:2px; }
  #again {
    display:block; width:100%; padding:12px; margin-bottom:12px;
    font-size:15px; font-weight:700; letter-spacing:.06em; color:#fff;
    background:linear-gradient(135deg,#7c3aed,#a855f7); border:none; border-radius:11px;
    cursor:pointer; box-shadow:0 4px 18px rgba(124,58,237,.45);
    transition:transform .12s ease;
  }
  #again:active { transform:scale(.96); }
  #panel .coming { font-size:12px; color:#8d84ad; margin-bottom:8px; }
  #panel .more { font-size:13px; color:#b79aff; text-decoration:none; }
  #panel .more:hover { color:#d9c6ff; }
</style>
</head>
<body>
<div id="topbar">
  <a class="back" href="/games/unearth.html">&larr; Back</a>
  <span class="title">UNEARTH</span>
  <span class="chip">SNEAK PEEK</span>
</div>
<div id="stage">
  <div id="playarea">
    <canvas id="game"></canvas>
    <div id="hint"></div>
    <div id="overlay">
      <div id="panel">
        <img src="/assets/games/unearth/icon.png" alt="Unearth icon">
        <h2 id="resTitle">FLOOR -1 CLEARED</h2>
        <p class="flavor" id="resFlavor"></p>
        <div id="stats">
          <span class="stat" id="stGold">0<span class="lbl">GOLD</span></span>
          <span class="stat k" id="stKills">0<span class="lbl">SKELETONS</span></span>
          <span class="stat t" id="stTime">0:00<span class="lbl">TIME</span></span>
        </div>
        <button id="again">Play again</button>
        <p class="coming">Coming soon to the App Store</p>
        <a class="more" href="/games/unearth.html">More about Unearth &rarr;</a>
      </div>
    </div>
  </div>
</div>
<script>
'use strict';
/* ============================================================
   UNEARTH — playable sneak peek (Floor -1)
   Real room prefabs from the game: small_box, pillar_hall, cross
   (# wall, . floor, X spawner, E exit, P pillar — pillars are
   walk-through, just like the real DungeonGenerator)
   ============================================================ */

const VW = 390, VH = 660, T = 36;

// roundRect fallback for older Safari
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r !== 'number') r = 4;
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// Floor -1: small_box (start) -> pillar_hall (spawner) -> cross (exit)
const MAP = [
  "    #######    ",
  "    #.....#    ",
  "    #..S..#    ",
  "    #.....#    ",
  "    #.....#    ",
  "    ###.###    ",
  "      #.#      ",
  "      #.#      ",
  " ######.###### ",
  " #...........# ",
  " #.P.......P.# ",
  " #...........# ",
  " #.....X.....# ",
  " #...........# ",
  " #.P.......P.# ",
  " #...........# ",
  " ######.###### ",
  "      #.#      ",
  "      #.#      ",
  "     ##.##     ",
  "     #...#     ",
  "     #...#     ",
  " #####...##### ",
  " #...........# ",
  " #.....E.....# ",
  " #...........# ",
  " #####...##### ",
  "     #...#     ",
  "     #...#     ",
  "     #####     ",
];
const COLS = MAP[0].length, ROWS = MAP.length;
const mapW = COLS * T, mapH = ROWS * T;

// ---------- parse ----------
const grid = [];           // 0 void, 1 floor, 2 wall
const pillars = [];
let playerStart = null, spawnerPos = null, exitPos = null;
for (let r = 0; r < ROWS; r++) {
  grid[r] = [];
  for (let c = 0; c < COLS; c++) {
    const ch = MAP[r][c];
    const wx = (c + .5) * T, wy = (r + .5) * T;
    if (ch === '#') grid[r][c] = 2;
    else if (ch === ' ') grid[r][c] = 0;
    else {
      grid[r][c] = 1;
      if (ch === 'S') playerStart = { x: wx, y: wy };
      if (ch === 'X') spawnerPos = { x: wx, y: wy };
      if (ch === 'E') exitPos = { x: wx, y: wy };
      if (ch === 'P') pillars.push({ x: wx, y: wy });
    }
  }
}
function tile(c, r) {
  if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return 0;
  return grid[r][c];
}
function solid(c, r) { return tile(c, r) !== 1; }

// ---------- canvas setup ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const playarea = document.getElementById('playarea');
const stage = document.getElementById('stage');
let renderScale = 1;
function resize() {
  const aw = stage.clientWidth - 12, ah = stage.clientHeight - 12;
  const s = Math.min(aw / VW, ah / VH);
  const cw = Math.floor(VW * s), chh = Math.floor(VH * s);
  playarea.style.width = cw + 'px';
  playarea.style.height = chh + 'px';
  canvas.style.width = cw + 'px';
  canvas.style.height = chh + 'px';
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(chh * dpr);
  renderScale = canvas.width / VW;
}
window.addEventListener('resize', resize);
resize();

// darkness layer (torchlight is punched out of it)
const dark = document.createElement('canvas');
dark.width = VW; dark.height = VH;
const dctx = dark.getContext('2d');

// ---------- terrain pre-render ----------
const TS = 2; // terrain supersample
const terrain = document.createElement('canvas');
terrain.width = mapW * TS; terrain.height = mapH * TS;
(function renderTerrain() {
  const g = terrain.getContext('2d');
  g.scale(TS, TS);
  g.fillStyle = '#0a0a14';
  g.fillRect(0, 0, mapW, mapH);
  const floorCols = ['#4c4459', '#524a61', '#473f57', '#564e66'];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const x = c * T, y = r * T, v = tile(c, r);
    const h = ((c * 73 + r * 131) >> 1) % 4;
    if (v === 1) {
      g.fillStyle = floorCols[h];
      g.fillRect(x, y, T, T);
      // low-poly facet: lighter diagonal half
      g.fillStyle = 'rgba(255,255,255,0.045)';
      g.beginPath(); g.moveTo(x, y); g.lineTo(x + T, y); g.lineTo(x, y + T); g.closePath(); g.fill();
      g.strokeStyle = 'rgba(20,16,32,0.55)';
      g.lineWidth = 1;
      g.strokeRect(x + .5, y + .5, T - 1, T - 1);
      if (h === 2) { // pebble crack
        g.strokeStyle = 'rgba(15,12,26,0.5)';
        g.beginPath(); g.moveTo(x + 8, y + 24); g.lineTo(x + 15, y + 18); g.lineTo(x + 21, y + 21); g.stroke();
      }
    } else if (v === 2) {
      const faceS = tile(c, r + 1) === 1; // south face visible
      g.fillStyle = '#221c33';
      g.fillRect(x, y, T, T);
      if (faceS) {
        g.fillStyle = '#5c5170';
        g.fillRect(x, y + T * .38, T, T * .62);
        g.fillStyle = 'rgba(0,0,0,0.22)';
        g.fillRect(x, y + T * .82, T, T * .18);
        g.strokeStyle = 'rgba(24,19,38,0.8)';
        g.lineWidth = 1;
        g.beginPath();
        g.moveTo(x, y + T * .62); g.lineTo(x + T, y + T * .62);
        g.moveTo(x + T * .5, y + T * .38); g.lineTo(x + T * .5, y + T * .62);
        g.moveTo(x + T * .25, y + T * .62); g.lineTo(x + T * .25, y + T);
        g.moveTo(x + T * .75, y + T * .62); g.lineTo(x + T * .75, y + T);
        g.stroke();
        g.fillStyle = 'rgba(255,255,255,0.06)';
        g.fillRect(x, y + T * .38, T, 2.5);
      } else {
        g.fillStyle = 'rgba(255,255,255,0.03)';
        g.fillRect(x + 2, y + 2, T - 4, T - 4);
      }
    }
  }
})();

// ---------- state ----------
let state = 'play'; // play | dead | won
let elapsed = 0, gold = 0, kills = 0;
let fadeIn = 1, endT = 0, freezeT = 0, flashT = 0, openFlashT = 0;
let overlayShown = false;

const player = {
  x: playerStart.x, y: playerStart.y, r: 11,
  hp: 10, maxhp: 10, face: Math.PI / 2,
  atkCD: 0, swingT: -1, iframes: 0, moving: false, bobT: 0, deadT: 0,
};
const spawner = { x: spawnerPos.x, y: spawnerPos.y, hp: 10, maxhp: 10, alive: true, cd: 2.0, hitT: 0 };
const exit = { x: exitPos.x, y: exitPos.y, active: false };

const enemies = [];
function addSkeleton(x, y, rising) {
  enemies.push({
    x, y, r: 10, hp: 3, maxhp: 3, kx: 0, ky: 0, dmgCD: 0,
    hitT: 0, spawnT: rising ? 0.7 : 0, bob: Math.random() * 6,
  });
}
// pre-placed Skeleton Minions
addSkeleton(4.5 * T, 11.5 * T, false);
addSkeleton(10.5 * T, 13.5 * T, false);
addSkeleton(11.5 * T, 24.5 * T, false);

const coins = [];
function addCoin(tc, tr, scatter) {
  const a = Math.random() * Math.PI * 2, sp = scatter ? 60 + Math.random() * 70 : 0;
  coins.push({
    x: (tc + .5) * T, y: (tr + .5) * T,
    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
    t: Math.random() * 6, val: 3, taken: false,
  });
}
[[6, 3], [8, 3], [7, 6], [2, 9], [12, 15], [2, 24], [3, 23], [11, 23], [12, 24], [6, 27], [8, 28]]
  .forEach(p => addCoin(p[0], p[1], false));
const potion = { x: 2.5 * T, y: 15.5 * T, taken: false, t: 0 }; // pillar hall corner

const torches = [
  { c: 5, r: 0 }, { c: 9, r: 0 }, { c: 4, r: 8 }, { c: 10, r: 8 },
  { c: 3, r: 22 }, { c: 11, r: 22 },
].map(t => ({ x: (t.c + .5) * T, y: (t.r + .78) * T, seed: Math.random() * 10 }));

const particles = [], floaties = [];
function puff(x, y, n, color, spd, life, grav) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = spd * (0.3 + Math.random() * 0.9);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - spd * 0.25,
      life: life * (0.6 + Math.random() * 0.7), max: life, color,
      size: 1.5 + Math.random() * 2.6, grav: grav || 0,
    });
  }
}
function floaty(x, y, txt, color, big) {
  floaties.push({ x, y, txt, color, life: 0.9, big: !!big });
}

// camera + shake
const cam = { x: player.x - VW / 2, y: player.y - VH / 2 };
let shakeT = 0, shakeD = 0, shakeA = 0;
function shake(a, d) { shakeA = Math.max(shakeA, a); shakeT = shakeD = Math.max(shakeT, d); }

// ---------- input ----------
const keys = {};
let hintGone = false, touchMode = false;
const hint = document.getElementById('hint');
hint.textContent = ('ontouchstart' in window)
  ? 'Left side: drag to move · right side: tap to attack'
  : 'WASD / arrows to move · click or Space to attack';
function killHint() {
  if (!hintGone) { hintGone = true; hint.classList.add('gone'); }
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase()) || e.key === ' ') e.preventDefault();
  if (e.repeat) { keys[k] = true; return; }
  keys[k] = true;
  killHint();
  if (k === ' ' || k === 'j' || k === 'enter') tryAttack();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function toLogical(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return { x: (cx - rect.left) / rect.width * VW, y: (cy - rect.top) / rect.height * VH };
}
canvas.addEventListener('mousedown', e => {
  e.preventDefault(); killHint();
  const p = toLogical(e.clientX, e.clientY);
  const wx = p.x + cam.x, wy = p.y + cam.y;
  const dx = wx - player.x, dy = wy - player.y;
  if (dx * dx + dy * dy > 100) player.face = Math.atan2(dy, dx);
  tryAttack();
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

const joy = { id: null, ox: 0, oy: 0, dx: 0, dy: 0 };
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); killHint(); touchMode = true;
  for (const t of e.changedTouches) {
    const p = toLogical(t.clientX, t.clientY);
    if (p.x > VW * 0.55) {
      tryAttack();
    } else if (joy.id === null) {
      joy.id = t.identifier; joy.ox = p.x; joy.oy = p.y; joy.dx = 0; joy.dy = 0;
    }
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      const p = toLogical(t.clientX, t.clientY);
      let dx = p.x - joy.ox, dy = p.y - joy.oy;
      const d = Math.hypot(dx, dy);
      if (d > 46) { dx = dx / d * 46; dy = dy / d * 46; }
      joy.dx = dx; joy.dy = dy;
    }
  }
}, { passive: false });
function endTouch(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) { joy.id = null; joy.dx = joy.dy = 0; }
  }
}
canvas.addEventListener('touchend', endTouch, { passive: false });
canvas.addEventListener('touchcancel', endTouch, { passive: false });

// ---------- helpers ----------
function angDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return Math.abs(d);
}
function pushFromSpawner(o) {
  if (!spawner.alive) return;
  const dx = o.x - spawner.x, dy = o.y - spawner.y;
  const d = Math.hypot(dx, dy), min = o.r + 17;
  if (d > 0 && d < min) { o.x += dx / d * (min - d); o.y += dy / d * (min - d); }
}
function moveCircle(o, dx, dy) {
  o.x += dx; o.y += dy;
  pushFromSpawner(o);
  const c0 = Math.floor((o.x - o.r) / T), c1 = Math.floor((o.x + o.r) / T);
  const r0 = Math.floor((o.y - o.r) / T), r1 = Math.floor((o.y + o.r) / T);
  for (let r = r0; r <= r1; r++) for (let c = c0; c <= c1; c++) {
    if (!solid(c, r)) continue;
    const nx = Math.max(c * T, Math.min(o.x, (c + 1) * T));
    const ny = Math.max(r * T, Math.min(o.y, (r + 1) * T));
    let ddx = o.x - nx, ddy = o.y - ny;
    const d2 = ddx * ddx + ddy * ddy;
    if (d2 < o.r * o.r) {
      let d = Math.sqrt(d2);
      if (d < 0.001) { ddx = 0; ddy = -1; d = 1; }
      const push = o.r - d;
      o.x += ddx / d * push; o.y += ddy / d * push;
    }
  }
}

// ---------- combat ----------
function tryAttack() {
  if (state !== 'play' || player.atkCD > 0) return;
  player.atkCD = 0.38;
  player.swingT = 0;
  let hit = false;
  for (const e of enemies) {
    if (e.hp <= 0 || e.spawnT > 0) continue;
    const dx = e.x - player.x, dy = e.y - player.y, d = Math.hypot(dx, dy);
    if (d < 58 && (d < 24 || angDiff(Math.atan2(dy, dx), player.face) < 1.15)) {
      e.hp--; e.hitT = 0.18; hit = true;
      e.kx += dx / d * 230; e.ky += dy / d * 230;
      puff(e.x, e.y, 7, '#efe8d4', 90, 0.4, 160);
      floaty(e.x, e.y - 18, '-1', '#ffd28a');
      if (e.hp <= 0) killSkeleton(e);
    }
  }
  if (spawner.alive) {
    const dx = spawner.x - player.x, dy = spawner.y - player.y, d = Math.hypot(dx, dy);
    if (d < 62 && angDiff(Math.atan2(dy, dx), player.face) < 1.2) {
      spawner.hp--; spawner.hitT = 0.18; hit = true;
      shake(3, 0.12);
      puff(spawner.x, spawner.y - 8, 6, '#8dff9d', 100, 0.4, 60);
      floaty(spawner.x, spawner.y - 30, '-1', '#8dff9d');
      if (spawner.hp <= 0) destroySpawner();
    }
  }
  if (hit) freezeT = 0.045;
}
function killSkeleton(e) {
  kills++;
  puff(e.x, e.y, 14, '#e6dfcb', 150, 0.55, 240);
  puff(e.x, e.y, 5, '#8a8172', 90, 0.5, 200);
  shake(2.5, 0.1);
  addCoin(e.x / T - .5, e.y / T - .5, true);
  addCoin(e.x / T - .5, e.y / T - .5, true);
}
function destroySpawner() {
  spawner.alive = false;
  exit.active = true;
  openFlashT = 1;
  shake(9, 0.45);
  freezeT = 0.09;
  puff(spawner.x, spawner.y, 30, '#8dff9d', 190, 0.8, 90);
  puff(spawner.x, spawner.y, 16, '#3a3145', 140, 0.7, 260);
  puff(exit.x, exit.y, 24, '#c084fc', 120, 0.9, -30);
  floaty(spawner.x, spawner.y - 34, 'SPAWNER DESTROYED', '#8dff9d', true);
}
function damagePlayer(n) {
  if (player.iframes > 0 || state !== 'play') return;
  player.hp -= n;
  player.iframes = 1.0;
  flashT = 0.35;
  shake(6, 0.3);
  puff(player.x, player.y, 8, '#e05555', 120, 0.4, 120);
  floaty(player.x, player.y - 20, '-1', '#ff7a7a');
  if (player.hp <= 0) { player.hp = 0; state = 'dead'; endT = 0; }
}

// ---------- update ----------
function update(dt) {
  elapsed += (state === 'play') ? dt : 0;
  if (fadeIn > 0) fadeIn = Math.max(0, fadeIn - dt * 1.4);
  if (flashT > 0) flashT -= dt;
  if (openFlashT > 0) openFlashT -= dt * 1.2;
  if (shakeT > 0) shakeT -= dt;
  potion.t += dt;

  // player
  if (state === 'play') {
    let mx = 0, my = 0;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (joy.id !== null) {
      const jl = Math.hypot(joy.dx, joy.dy);
      if (jl > 7) { mx = joy.dx / 46; my = joy.dy / 46; }
    }
    const ml = Math.hypot(mx, my);
    player.moving = ml > 0.01;
    if (player.moving) {
      const cap = Math.min(1, ml);
      mx = mx / ml * cap; my = my / ml * cap;
      player.face = Math.atan2(my, mx);
      player.bobT += dt * 11;
      moveCircle(player, mx * 150 * dt, my * 150 * dt);
    }
    if (player.atkCD > 0) player.atkCD -= dt;
    if (player.iframes > 0) player.iframes -= dt;

    // pickups
    for (const c of coins) {
      if (c.taken) continue;
      c.t += dt;
      const fr = Math.pow(0.002, dt);
      c.vx *= fr; c.vy *= fr;
      const nx = c.x + c.vx * dt, ny = c.y + c.vy * dt;
      if (solid(Math.floor(nx / T), Math.floor(c.y / T))) c.vx *= -0.4; else c.x = nx;
      if (solid(Math.floor(c.x / T), Math.floor(ny / T))) c.vy *= -0.4; else c.y = ny;
      const dx = player.x - c.x, dy = player.y - c.y, d = Math.hypot(dx, dy);
      if (d < 70 && c.t > 0.4) { c.vx += dx / d * 5400 * dt; c.vy += dy / d * 5400 * dt; }
      if (d < 16) {
        c.taken = true; gold += c.val;
        puff(c.x, c.y, 6, '#f4d97a', 80, 0.35, -40);
        floaty(player.x, player.y - 24, '+' + c.val, '#f4d97a');
      }
    }
    if (!potion.taken) {
      const d = Math.hypot(player.x - potion.x, player.y - potion.y);
      if (d < 20) {
        potion.taken = true;
        const healed = Math.min(3, player.maxhp - player.hp);
        player.hp += healed;
        puff(potion.x, potion.y, 12, '#ff6b81', 100, 0.5, -60);
        floaty(player.x, player.y - 24, healed > 0 ? '+' + healed + ' HP' : 'HP FULL', '#ff8fa0');
      }
    }

    // exit
    if (exit.active) {
      const d = Math.hypot(player.x - exit.x, player.y - exit.y);
      if (d < 20) { state = 'won'; endT = 0; }
    }
  }
  if (state === 'dead') { player.deadT += dt; endT += dt; if (endT > 1.1) showOverlay(false); }
  if (state === 'won') { endT += dt; if (endT > 1.0) showOverlay(true); }
  if (player.swingT >= 0) { player.swingT += dt; if (player.swingT > 0.2) player.swingT = -1; }

  // spawner: endlessly spits out Skeleton Minions until destroyed
  if (spawner.alive && state === 'play') {
    if (spawner.hitT > 0) spawner.hitT -= dt;
    const alive = enemies.filter(e => e.hp > 0).length;
    const near = Math.hypot(player.x - spawner.x, player.y - spawner.y) < 300;
    spawner.cd -= dt;
    if (spawner.cd <= 0 && near && alive < 4 && enemies.filter(e => e.hp > 0 && e.fromSpawner).length < 1) {
      spawner.cd = 3.2;
      const a = Math.random() * Math.PI * 2;
      const sk = { x: spawner.x + Math.cos(a) * 30, y: spawner.y + Math.sin(a) * 30 };
      addSkeleton(sk.x, sk.y, true);
      enemies[enemies.length - 1].fromSpawner = true;
      puff(sk.x, sk.y, 10, '#8dff9d', 70, 0.5, -80);
    }
  }

  // enemies
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if (e.spawnT > 0) { e.spawnT -= dt; continue; }
    if (e.hitT > 0) e.hitT -= dt;
    if (e.dmgCD > 0) e.dmgCD -= dt;
    e.bob += dt * 9;
    const kf = Math.pow(0.0008, dt);
    e.kx *= kf; e.ky *= kf;
    let vx = e.kx, vy = e.ky;
    const dx = player.x - e.x, dy = player.y - e.y, d = Math.hypot(dx, dy) || 1;
    if (d < 175 && state === 'play') { // chases inside the torch radius
      vx += dx / d * 80; vy += dy / d * 80;
      // separation
      for (const o of enemies) {
        if (o === e || o.hp <= 0) continue;
        const sx = e.x - o.x, sy = e.y - o.y, sd = Math.hypot(sx, sy);
        if (sd > 0 && sd < 22) { vx += sx / sd * 60; vy += sy / sd * 60; }
      }
      if (d < 24 && e.dmgCD <= 0) { damagePlayer(1); e.dmgCD = 1; } // 1 dmg per 1s, close range
    }
    moveCircle(e, vx * dt, vy * dt);
    // don't let enemies stack on top of the player
    const pdx = e.x - player.x, pdy = e.y - player.y, pd = Math.hypot(pdx, pdy);
    if (pd > 0 && pd < 20) { e.x += pdx / pd * (20 - pd); e.y += pdy / pd * (20 - pd); }
  }

  // particles / floaties
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.vy += p.grav * dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  for (let i = floaties.length - 1; i >= 0; i--) {
    const f = floaties[i];
    f.life -= dt; f.y -= 34 * dt;
    if (f.life <= 0) floaties.splice(i, 1);
  }
  // ambient torch embers
  if (Math.random() < dt * 5) {
    const t = torches[(Math.random() * torches.length) | 0];
    particles.push({
      x: t.x + (Math.random() - .5) * 4, y: t.y - 14,
      vx: (Math.random() - .5) * 14, vy: -26 - Math.random() * 20,
      life: 0.7, max: 0.7, color: '#ffb347', size: 1.6, grav: -14,
    });
  }
  if (exit.active && Math.random() < dt * 14) {
    particles.push({
      x: exit.x + (Math.random() - .5) * 30, y: exit.y + (Math.random() - .5) * 22,
      vx: (Math.random() - .5) * 12, vy: -34 - Math.random() * 28,
      life: 1.0, max: 1.0, color: '#c084fc', size: 1.8, grav: -20,
    });
  }
  if (spawner.alive && Math.random() < dt * 6) {
    particles.push({
      x: spawner.x + (Math.random() - .5) * 22, y: spawner.y - 4,
      vx: (Math.random() - .5) * 10, vy: -20 - Math.random() * 14,
      life: 0.8, max: 0.8, color: '#57e389', size: 1.6, grav: -12,
    });
  }

  // camera
  const tx = Math.max(0, Math.min(mapW - VW, player.x - VW / 2));
  const ty = Math.max(0, Math.min(mapH - VH, player.y - VH / 2));
  const cl = Math.min(1, dt * 6);
  cam.x += (tx - cam.x) * cl;
  cam.y += (ty - cam.y) * cl;
}

// ---------- draw ----------
function heartPath(g, x, y, s) {
  g.beginPath();
  g.moveTo(x, y + s * 0.32);
  g.bezierCurveTo(x, y - s * 0.28, x - s, y - s * 0.28, x - s, y + s * 0.24);
  g.bezierCurveTo(x - s, y + s * 0.62, x - s * 0.45, y + s * 0.82, x, y + s * 1.08);
  g.bezierCurveTo(x + s * 0.45, y + s * 0.82, x + s, y + s * 0.62, x + s, y + s * 0.24);
  g.bezierCurveTo(x + s, y - s * 0.28, x, y - s * 0.28, x, y + s * 0.32);
  g.closePath();
}

function drawPillar(g, p) {
  const x = p.x, y = p.y;
  g.fillStyle = 'rgba(0,0,0,0.35)';
  g.beginPath(); g.ellipse(x, y + 10, 13, 5, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#544a66';
  g.fillRect(x - 9, y - 26, 18, 34);
  g.fillStyle = '#463d56';
  g.fillRect(x + 2, y - 26, 7, 34);
  g.fillStyle = '#6b6080';
  g.fillRect(x - 11, y - 32, 22, 8);
  g.fillStyle = '#584e6a';
  g.fillRect(x - 11, y - 28, 22, 3);
  g.fillStyle = '#655a7a';
  g.fillRect(x - 11, y + 6, 22, 6);
}

function drawTorchFlame(g, t, time) {
  const fl = Math.sin(time * 13 + t.seed * 7) * 0.18 + Math.sin(time * 29 + t.seed) * 0.1;
  g.fillStyle = '#4a3b2c';
  g.fillRect(t.x - 1.5, t.y - 12, 3, 12);
  g.fillStyle = '#2b2338';
  g.fillRect(t.x - 4, t.y - 2, 8, 4);
  const r = 5.5 * (1 + fl);
  g.fillStyle = 'rgba(255,120,40,0.55)';
  g.beginPath(); g.ellipse(t.x, t.y - 15, r + 3, r + 5, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#ff9e3d';
  g.beginPath(); g.ellipse(t.x, t.y - 15, r, r + 2.5, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#ffd980';
  g.beginPath(); g.ellipse(t.x, t.y - 14 + fl * 3, r * 0.5, r * 0.9, 0, 0, Math.PI * 2); g.fill();
}

function drawExitStairs(g, time) {
  const x = exit.x, y = exit.y;
  const act = exit.active;
  const pulse = act ? (Math.sin(time * 4) * 0.5 + 0.5) : 0;
  // stairwell hole
  g.fillStyle = '#0b0716';
  g.fillRect(x - 22, y - 20, 44, 40);
  const steps = ['#4c4260', '#3a3150', '#2a2140', '#1a1230'];
  for (let i = 0; i < 4; i++) {
    const inset = i * 5;
    g.fillStyle = steps[i];
    g.fillRect(x - 22 + inset, y - 20 + i * 8, 44 - inset * 2, 8);
  }
  g.fillStyle = act ? 'rgba(168,85,247,' + (0.5 + pulse * 0.4) + ')' : 'rgba(120,70,180,0.18)';
  g.fillRect(x - 12, y + 8, 24, 10);
  // rim
  g.strokeStyle = act ? 'rgba(192,132,252,' + (0.7 + pulse * 0.3) + ')' : 'rgba(140,90,200,0.25)';
  g.lineWidth = 2;
  g.strokeRect(x - 22, y - 20, 44, 40);
  if (act) {
    g.save();
    g.globalCompositeOperation = 'lighter';
    const gr = g.createRadialGradient(x, y, 4, x, y, 55 + pulse * 12);
    gr.addColorStop(0, 'rgba(168,85,247,0.5)');
    gr.addColorStop(1, 'rgba(168,85,247,0)');
    g.fillStyle = gr;
    g.fillRect(x - 70, y - 70, 140, 140);
    g.restore();
  }
}

function drawSpawner(g, time) {
  const x = spawner.x, y = spawner.y;
  if (!spawner.alive) {
    g.fillStyle = 'rgba(0,0,0,0.3)';
    g.beginPath(); g.ellipse(x, y + 8, 18, 6, 0, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#332b44';
    g.fillRect(x - 15, y - 2, 12, 10);
    g.fillRect(x + 4, y - 5, 10, 13);
    g.fillStyle = '#2a2338';
    g.fillRect(x - 4, y + 1, 8, 7);
    return;
  }
  const sq = spawner.hitT > 0 ? 1 + spawner.hitT * 0.9 : 1;
  const pulse = Math.sin(time * 5) * 0.5 + 0.5;
  g.save();
  g.translate(x, y);
  g.scale(sq, 2 - sq);
  g.fillStyle = 'rgba(0,0,0,0.4)';
  g.beginPath(); g.ellipse(0, 12, 20, 7, 0, 0, Math.PI * 2); g.fill();
  // stone base
  g.fillStyle = '#3a3145';
  g.fillRect(-18, 2, 36, 12);
  g.fillStyle = '#4a4058';
  g.fillRect(-18, 2, 36, 4);
  // cage body
  g.fillStyle = '#2c2540';
  g.fillRect(-14, -24, 28, 28);
  // green core
  const cg = g.createRadialGradient(0, -10, 1, 0, -10, 14);
  cg.addColorStop(0, 'rgba(180,255,190,' + (0.9 - pulse * 0.2) + ')');
  cg.addColorStop(0.5, 'rgba(87,227,137,0.8)');
  cg.addColorStop(1, 'rgba(87,227,137,0)');
  g.fillStyle = cg;
  g.fillRect(-14, -24, 28, 28);
  // bars
  g.fillStyle = '#221c33';
  g.fillRect(-14, -24, 4, 28); g.fillRect(10, -24, 4, 28);
  g.fillRect(-4, -24, 3, 28); g.fillRect(3, -24, 3, 28);
  g.fillStyle = '#443a58';
  g.fillRect(-16, -28, 32, 6);
  // cracks by damage
  const dmg = spawner.maxhp - spawner.hp;
  if (dmg > 2) {
    g.strokeStyle = '#8dff9d'; g.lineWidth = 1;
    g.beginPath(); g.moveTo(-12, 0); g.lineTo(-7, -6); g.lineTo(-10, -12); g.stroke();
  }
  if (dmg > 5) {
    g.strokeStyle = '#c6ffcf'; g.lineWidth = 1.2;
    g.beginPath(); g.moveTo(12, -4); g.lineTo(6, -10); g.lineTo(9, -18); g.stroke();
  }
  if (dmg > 7) {
    g.strokeStyle = '#eafff0'; g.lineWidth = 1.4;
    g.beginPath(); g.moveTo(0, 2); g.lineTo(-3, -8); g.lineTo(2, -16); g.lineTo(-1, -22); g.stroke();
  }
  g.restore();
  // HP bar
  if (dmg > 0) {
    const w = 36, frac = spawner.hp / spawner.maxhp;
    g.fillStyle = 'rgba(10,8,18,0.8)';
    g.fillRect(x - w / 2, y - 38, w, 5);
    g.fillStyle = '#57e389';
    g.fillRect(x - w / 2 + 1, y - 37, (w - 2) * frac, 3);
  }
}

function drawSkeleton(g, e, time) {
  if (e.hp <= 0) return;
  const rise = e.spawnT > 0 ? 1 - e.spawnT / 0.7 : 1;
  const bobY = Math.sin(e.bob) * 1.6;
  const sq = e.hitT > 0 ? 1 + e.hitT * 1.2 : 1;
  g.save();
  g.translate(e.x, e.y + (1 - rise) * 10);
  g.globalAlpha = 0.3 * rise;
  g.fillStyle = '#000';
  g.beginPath(); g.ellipse(0, 9, 10, 4, 0, 0, Math.PI * 2); g.fill();
  g.globalAlpha = rise;
  g.scale(sq, 2 - sq);
  g.translate(0, bobY);
  const body = e.hitT > 0.09 ? '#ffffff' : '#d9d2c0';
  const skull = e.hitT > 0.09 ? '#ffffff' : '#e8e2d2';
  // body
  g.fillStyle = body;
  g.beginPath();
  g.roundRect(-7, -6, 14, 15, 4);
  g.fill();
  // ribs
  g.strokeStyle = 'rgba(120,110,90,0.7)'; g.lineWidth = 1;
  g.beginPath();
  g.moveTo(-5, -1); g.lineTo(5, -1);
  g.moveTo(-5, 3); g.lineTo(5, 3);
  g.stroke();
  // arms
  g.fillStyle = body;
  g.fillRect(-10, -4, 3, 9);
  g.fillRect(7, -4, 3, 9);
  // skull
  g.fillStyle = skull;
  g.beginPath();
  g.roundRect(-8, -20, 16, 15, 6);
  g.fill();
  g.fillRect(-4, -7, 8, 3);
  // eyes: cursed green glow
  g.fillStyle = '#241f31';
  g.beginPath(); g.arc(-3.5, -13, 2.6, 0, Math.PI * 2); g.arc(3.5, -13, 2.6, 0, Math.PI * 2); g.fill();
  const gl = Math.sin(time * 6 + e.bob) * 0.3 + 0.7;
  g.fillStyle = 'rgba(141,255,157,' + gl + ')';
  g.beginPath(); g.arc(-3.5, -13, 1.1, 0, Math.PI * 2); g.arc(3.5, -13, 1.1, 0, Math.PI * 2); g.fill();
  g.restore();
}

function drawPlayer(g, time) {
  const p = player;
  g.save();
  g.translate(p.x, p.y);
  if (state === 'dead') {
    const t = Math.min(1, p.deadT * 1.4);
    g.globalAlpha = 1 - t * 0.6;
    g.rotate(t * Math.PI / 2);
    g.translate(0, t * 4);
  }
  if (state === 'won') {
    const t = Math.min(1, endT * 1.5);
    g.globalAlpha = 1 - t;
    g.scale(1 - t * 0.5, 1 - t * 0.5);
    g.translate(0, t * 10);
  }
  const bob = p.moving ? Math.sin(p.bobT) * 1.6 : Math.sin(time * 2.2) * 0.7;
  const flash = p.iframes > 0 && (Math.floor(p.iframes * 14) % 2 === 0);
  g.fillStyle = 'rgba(0,0,0,0.4)';
  g.beginPath(); g.ellipse(0, 10, 11, 4.5, 0, 0, Math.PI * 2); g.fill();
  g.translate(0, bob);
  if (flash) g.globalAlpha *= 0.45;

  // torch in off-hand (the light source)
  const offA = p.face + Math.PI / 2;
  const tox = Math.cos(offA) * 11, toy = Math.sin(offA) * 11;
  g.strokeStyle = '#4a3b2c'; g.lineWidth = 3;
  g.beginPath(); g.moveTo(tox, toy + 2); g.lineTo(tox, toy - 8); g.stroke();
  const fl = Math.sin(time * 15) * 0.25 + 1;
  g.fillStyle = '#ff9e3d';
  g.beginPath(); g.ellipse(tox, toy - 11, 3.4 * fl, 4.4 * fl, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#ffd980';
  g.beginPath(); g.ellipse(tox, toy - 10.5, 1.7, 2.3, 0, 0, Math.PI * 2); g.fill();

  // body: low-poly knight
  g.fillStyle = '#6d7a96';
  g.beginPath(); g.roundRect(-8, -6, 16, 16, 5); g.fill();
  g.fillStyle = '#59657e';
  g.beginPath(); g.roundRect(-8, 3, 16, 7, 4); g.fill();
  g.fillStyle = '#8b98b4';
  g.fillRect(-8, -6, 16, 3);
  // helmet
  g.fillStyle = '#a4b0c8';
  g.beginPath(); g.roundRect(-7.5, -19, 15, 14, 6); g.fill();
  g.fillStyle = '#78849e';
  g.beginPath(); g.roundRect(0, -19, 7.5, 14, 6); g.fill();
  // visor slit
  g.fillStyle = '#1c2230';
  g.fillRect(-5.5, -14, 11, 3);
  // plume
  g.fillStyle = '#a855f7';
  g.beginPath(); g.ellipse(0, -20.5, 3.2, 2.2, 0, 0, Math.PI * 2); g.fill();

  // sword
  const swinging = p.swingT >= 0;
  let bladeA = p.face + 0.5;
  let trail = 0;
  if (swinging) {
    const t = Math.min(1, p.swingT / 0.18);
    const ease = 1 - Math.pow(1 - t, 3);
    bladeA = p.face - 1.5 + ease * 3.0;
    trail = 1 - t;
  }
  g.save();
  g.rotate(bladeA);
  g.fillStyle = '#3d3428';
  g.fillRect(8, -1.5, 5, 3);
  g.fillStyle = '#8b98b4';
  g.fillRect(12, -3.5, 3, 7);
  g.fillStyle = swinging ? '#f4f8ff' : '#cdd6e4';
  g.beginPath();
  g.moveTo(15, -2.4); g.lineTo(30, -1.4); g.lineTo(33, 0); g.lineTo(30, 1.4); g.lineTo(15, 2.4);
  g.closePath(); g.fill();
  g.fillStyle = 'rgba(255,255,255,0.5)';
  g.fillRect(15, -1.8, 15, 1.2);
  g.restore();

  // slash arc
  if (swinging && trail > 0) {
    g.save();
    g.rotate(p.face);
    g.globalAlpha = trail * 0.75;
    const gr = g.createRadialGradient(0, 0, 12, 0, 0, 52);
    gr.addColorStop(0, 'rgba(255,220,150,0)');
    gr.addColorStop(0.7, 'rgba(255,230,170,0.5)');
    gr.addColorStop(1, 'rgba(255,240,200,0)');
    g.fillStyle = gr;
    g.beginPath();
    g.arc(0, 0, 52, -1.15, 1.15);
    g.arc(0, 0, 14, 1.15, -1.15, true);
    g.closePath(); g.fill();
    g.restore();
  }
  g.restore();
}

function drawCoin(g, c, time) {
  const w = Math.abs(Math.sin(c.t * 5)) * 0.7 + 0.3;
  g.fillStyle = 'rgba(0,0,0,0.3)';
  g.beginPath(); g.ellipse(c.x, c.y + 5, 5, 2, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#b8860b';
  g.beginPath(); g.ellipse(c.x, c.y, 5.5 * w, 5.5, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#f4d97a';
  g.beginPath(); g.ellipse(c.x, c.y - 0.6, 4.4 * w, 4.4, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#c9a227';
  g.beginPath(); g.ellipse(c.x, c.y - 0.6, 2.2 * w, 2.2, 0, 0, Math.PI * 2); g.fill();
}

function drawPotion(g, time) {
  const bob = Math.sin(potion.t * 3) * 2;
  const x = potion.x, y = potion.y + bob;
  g.fillStyle = 'rgba(0,0,0,0.3)';
  g.beginPath(); g.ellipse(potion.x, potion.y + 8, 6, 2.5, 0, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#c94f63';
  g.beginPath(); g.arc(x, y, 6.5, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#ff8fa0';
  g.beginPath(); g.arc(x - 2, y - 2, 2.2, 0, Math.PI * 2); g.fill();
  g.fillStyle = '#7a5a3a';
  g.fillRect(x - 2, y - 11, 4, 4);
  g.fillStyle = '#d9d2c0';
  g.fillRect(x - 2.8, y - 8, 5.6, 2);
}

function punchLight(x, y, r, strength) {
  const g = dctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, 'rgba(0,0,0,' + strength + ')');
  g.addColorStop(0.55, 'rgba(0,0,0,' + strength * 0.82 + ')');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  dctx.fillStyle = g;
  dctx.beginPath(); dctx.arc(x, y, r, 0, Math.PI * 2); dctx.fill();
}

function draw(time) {
  ctx.setTransform(renderScale, 0, 0, renderScale, 0, 0);
  ctx.imageSmoothingEnabled = true;
  // shake
  let sx = 0, sy = 0;
  if (shakeT > 0 && shakeD > 0) {
    const k = shakeT / shakeD;
    sx = (Math.random() - .5) * 2 * shakeA * k;
    sy = (Math.random() - .5) * 2 * shakeA * k;
  }
  const cx = cam.x + sx, cy = cam.y + sy;

  // terrain
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, VW, VH);
  ctx.lineJoin = 'round';
  ctx.drawImage(terrain, 0, 0, terrain.width, terrain.height, -cx, -cy, mapW, mapH);

  ctx.save();
  ctx.translate(-cx, -cy);

  // floor-level things
  drawExitStairs(ctx, time);
  for (const c of coins) if (!c.taken) drawCoin(ctx, c, time);
  if (!potion.taken) drawPotion(ctx, time);

  // y-sorted actors
  const actors = [];
  for (const p of pillars) actors.push({ y: p.y, f: () => drawPillar(ctx, p) });
  actors.push({ y: spawner.y, f: () => drawSpawner(ctx, time) });
  for (const e of enemies) actors.push({ y: e.y, f: () => drawSkeleton(ctx, e, time) });
  actors.push({ y: player.y, f: () => drawPlayer(ctx, time) });
  actors.sort((a, b) => a.y - b.y);
  for (const a of actors) a.f();

  // wall torches
  for (const t of torches) drawTorchFlame(ctx, t, time);

  // particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ---- darkness / torchlight ----
  dctx.setTransform(1, 0, 0, 1, 0, 0);
  dctx.globalCompositeOperation = 'source-over';
  dctx.clearRect(0, 0, VW, VH);
  dctx.fillStyle = 'rgba(4,4,12,0.985)';
  dctx.fillRect(0, 0, VW, VH);
  dctx.globalCompositeOperation = 'destination-out';
  const flick = 1 + Math.sin(time * 9) * 0.02 + Math.sin(time * 23) * 0.015;
  punchLight(player.x - cx, player.y - cy, 176 * flick, 1);
  for (const t of torches) punchLight(t.x - cx, t.y - cy - 14, 66 * flick, 0.85);
  if (spawner.alive) punchLight(spawner.x - cx, spawner.y - cy - 8, 52, 0.7);
  punchLight(exit.x - cx, exit.y - cy, exit.active ? 95 + Math.sin(time * 4) * 10 : 34, exit.active ? 0.95 : 0.5);
  ctx.drawImage(dark, 0, 0, VW, VH);

  // warm additive glow at player torch, purple at exit
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  let gr = ctx.createRadialGradient(player.x - cx, player.y - cy, 5, player.x - cx, player.y - cy, 150);
  gr.addColorStop(0, 'rgba(255,140,50,0.12)');
  gr.addColorStop(1, 'rgba(255,140,50,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, VW, VH);
  if (exit.active) {
    const ex = exit.x - cx, ey = exit.y - cy;
    gr = ctx.createRadialGradient(ex, ey, 4, ex, ey, 110);
    gr.addColorStop(0, 'rgba(168,85,247,0.28)');
    gr.addColorStop(1, 'rgba(168,85,247,0)');
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, VW, VH);
  }
  ctx.restore();

  // floaties (above darkness so always readable)
  ctx.save();
  ctx.translate(-cx, -cy);
  ctx.textAlign = 'center';
  for (const f of floaties) {
    ctx.globalAlpha = Math.min(1, f.life * 2.2);
    ctx.font = (f.big ? '700 13px' : '700 12px') + ' -apple-system, sans-serif';
    ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3;
    ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  drawHUD(time);

  // damage flash
  if (flashT > 0) {
    ctx.fillStyle = 'rgba(200,30,30,' + (flashT * 0.5) + ')';
    ctx.fillRect(0, 0, VW, VH);
  }
  // "way opens" purple flash
  if (openFlashT > 0) {
    ctx.fillStyle = 'rgba(168,85,247,' + (openFlashT * 0.22) + ')';
    ctx.fillRect(0, 0, VW, VH);
  }
  // win fade to purple-black
  if (state === 'won') {
    const t = Math.min(1, endT * 1.2);
    ctx.fillStyle = 'rgba(20,8,36,' + (t * 0.85) + ')';
    ctx.fillRect(0, 0, VW, VH);
  }
  if (state === 'dead') {
    const t = Math.min(1, endT * 0.9);
    ctx.fillStyle = 'rgba(8,4,10,' + (t * 0.7) + ')';
    ctx.fillRect(0, 0, VW, VH);
  }
  // fade-in from black
  if (fadeIn > 0) {
    ctx.fillStyle = 'rgba(5,5,12,' + fadeIn + ')';
    ctx.fillRect(0, 0, VW, VH);
  }
}

function drawHUD(time) {
  // hearts (2 HP each)
  for (let i = 0; i < 5; i++) {
    const hx = 20 + i * 22, hy = 18;
    const full = player.hp >= (i + 1) * 2, half = player.hp === i * 2 + 1;
    const low = player.hp <= 2;
    const s = 8 * (low && (full || half) ? 1 + Math.sin(time * 8) * 0.12 : 1);
    heartPath(ctx, hx, hy, s);
    ctx.fillStyle = 'rgba(10,8,18,0.75)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,120,120,0.35)'; ctx.lineWidth = 1.2; ctx.stroke();
    if (full || half) {
      ctx.save();
      heartPath(ctx, hx, hy, s);
      ctx.clip();
      ctx.fillStyle = '#e04a5a';
      if (half) ctx.fillRect(hx - s, hy - s, s, s * 2.3);
      else ctx.fillRect(hx - s, hy - s, s * 2, s * 2.3);
      ctx.restore();
    }
  }
  // gold, top-right
  ctx.textAlign = 'right';
  ctx.font = '700 15px -apple-system, sans-serif';
  ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3;
  ctx.strokeText(String(gold), VW - 34, 24);
  ctx.fillStyle = '#f4d97a';
  ctx.fillText(String(gold), VW - 34, 24);
  ctx.fillStyle = '#b8860b';
  ctx.beginPath(); ctx.arc(VW - 22, 19, 6.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f4d97a';
  ctx.beginPath(); ctx.arc(VW - 22, 18.4, 5.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#c9a227';
  ctx.beginPath(); ctx.arc(VW - 22, 18.4, 2.6, 0, Math.PI * 2); ctx.fill();

  // floor + objective, top-center
  ctx.textAlign = 'center';
  ctx.font = '800 13px -apple-system, sans-serif';
  ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 3;
  ctx.strokeText('FLOOR -1', VW / 2, 22);
  ctx.fillStyle = '#cfc8e6';
  ctx.fillText('FLOOR -1', VW / 2, 22);
  const obj = spawner.alive ? 'Destroy the skeleton spawner'
    : 'The way is open — descend the stairs';
  ctx.font = '600 10.5px -apple-system, sans-serif';
  ctx.strokeText(obj, VW / 2, 37);
  ctx.fillStyle = spawner.alive ? '#8dff9d' : '#c9a6ff';
  ctx.fillText(obj, VW / 2, 37);

  // objective arrow when target offscreen
  const tgt = spawner.alive ? spawner : (exit.active ? exit : null);
  if (tgt && state === 'play') {
    const px = tgt.x - cam.x, py = tgt.y - cam.y;
    if (px < -10 || px > VW + 10 || py < -10 || py > VH + 10) {
      const ang = Math.atan2(tgt.y - player.y, tgt.x - player.x);
      const ax = Math.max(24, Math.min(VW - 24, player.x - cam.x + Math.cos(ang) * 120));
      const ay = Math.max(58, Math.min(VH - 90, player.y - cam.y + Math.sin(ang) * 120));
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(ang);
      ctx.globalAlpha = 0.55 + Math.sin(time * 5) * 0.25;
      ctx.fillStyle = spawner.alive ? '#8dff9d' : '#c084fc';
      ctx.beginPath();
      ctx.moveTo(10, 0); ctx.lineTo(-6, -7); ctx.lineTo(-2, 0); ctx.lineTo(-6, 7);
      ctx.closePath(); ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  // touch controls
  if (touchMode && state === 'play') {
    if (joy.id !== null) {
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#cfc8e6';
      ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 40, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(joy.ox + joy.dx, joy.oy + joy.dy, 20, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // attack button
    const bx = VW - 54, by = VH - 62;
    const ready = player.atkCD <= 0;
    ctx.globalAlpha = ready ? 0.4 : 0.18;
    ctx.fillStyle = ready ? '#a855f7' : '#6f668f';
    ctx.beginPath(); ctx.arc(bx, by, 36, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = '#e9d5ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by, 36, 0, Math.PI * 2); ctx.stroke();
    // sword glyph
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = '#f0ecfa';
    ctx.fillRect(-2.5, -18, 5, 26);
    ctx.fillRect(-9, 6, 18, 4);
    ctx.fillRect(-2, 10, 4, 8);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// ---------- end overlay ----------
function showOverlay(win) {
  if (overlayShown) return;
  overlayShown = true;
  const title = document.getElementById('resTitle');
  const flavor = document.getElementById('resFlavor');
  if (win) {
    title.textContent = 'FLOOR -1 CLEARED';
    title.className = 'win';
    flavor.textContent = 'The stairs spiral deeper into the dark. Forty-nine floors wait below — and something purple is glowing at the bottom.';
  } else {
    title.textContent = 'YOU FELL';
    title.className = 'lose';
    flavor.textContent = 'The dungeon keeps what it takes. Every run teaches you something — descend again.';
  }
  document.getElementById('stGold').firstChild.textContent = String(gold);
  document.getElementById('stKills').firstChild.textContent = String(kills);
  const m = Math.floor(elapsed / 60), s = Math.floor(elapsed % 60);
  document.getElementById('stTime').firstChild.textContent = m + ':' + String(s).padStart(2, '0');
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('again').addEventListener('click', () => location.reload());

// ---------- main loop ----------
let last = performance.now();
function frame(now) {
  let dt = Math.max(0, Math.min(0.05, (now - last) / 1000));
  last = now;
  if (freezeT > 0) { freezeT -= dt; dt = 0; }
  update(dt);
  draw(now / 1000);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
